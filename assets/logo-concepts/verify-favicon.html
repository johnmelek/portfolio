<!doctype html>
<html><head><meta charset="utf-8"><style>body{background:#161616;color:#fff;font-family:Arial;padding:30px}
.row{display:flex;gap:30px;align-items:flex-end}
.box{background:#222;border:1px solid #333;border-radius:12px;padding:20px}
.box img{display:block}
.lbl{font-size:12px;color:#9a958c;margin-top:8px;text-align:center}</style></head>
<body>
<h3>Simplified bold favicon (red square + white JM) for 16px tab legibility</h3>
<div class="row">
  <div><div class="box"><img src="../../assets/favicon.png" width="160" height="160"></div><div class="lbl">160</div></div>
  <div><div class="box"><img src="../../assets/favicon.png" width="64" height="64"></div><div class="lbl">64</div></div>
  <div><div class="box"><img src="../../assets/favicon.png" width="32" height="32"></div><div class="lbl">32</div></div>
  <div><div class="box"><img src="../../assets/favicon.png" width="16" height="16"></div><div class="lbl">16</div></div>
</div>
</body></html>
