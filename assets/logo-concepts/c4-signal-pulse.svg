<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="JM Signal Pulse logo">
  <defs>
    <style>
      .bg{fill:#0a0a0b}
      .acc{fill:#ff4d2e}
      .slab{fill:#f4f1ea}
      .bar{fill:#f4f1ea}
    </style>
  </defs>
  <rect class="bg" width="200" height="200" rx="14"/>
  <!-- signal bars rising -->
  <rect class="bar" x="46" y="120" width="18" height="34"/>
  <rect class="bar" x="74" y="100" width="18" height="54"/>
  <rect class="bar" x="102" y="78" width="18" height="76"/>
  <rect class="bar" x="130" y="58" width="18" height="96"/>
  <!-- AI dot on top of tallest bar -->
  <circle class="acc" cx="139" cy="46" r="13"/>
  <!-- baseline -->
  <rect class="acc" x="46" y="158" width="102" height="8"/>
  <text x="100" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="18" letter-spacing="3" class="slab">JM</text>
</svg>
