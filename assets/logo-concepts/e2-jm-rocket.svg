<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="JM Neural Rocket">
  <defs><style>
    .bg{fill:#0a0a0b}
    .ln{fill:none;stroke:#ff4d2e;stroke-width:26;stroke-linecap:round;stroke-linejoin:round}
    .w{fill:none;stroke:#f4f1ea;stroke-width:26;stroke-linecap:round;stroke-linejoin:round}
    .acc{fill:#ff4d2e}
    .node{fill:#f4f1ea}
  </style></defs>
  <rect class="bg" width="200" height="200" rx="14"/>
  <!-- M white, J red, overlapping -->
  <path class="w" d="M92 150 L92 40 L120 112 L148 40 L148 150"/>
  <path class="ln" d="M62 40 L62 128 Q62 158 36 158" transform="translate(4,0)"/>
  <!-- the NEGATIVE SPACE between J and M forms a launch channel; AI node rockets up it -->
  <path class="acc" d="M78 150 L90 110 L70 110 L82 70 L58 104 L78 104 L70 150 Z"/>
  <!-- neural links from the rocket node -->
  <g stroke="#ff4d2e" stroke-width="5" opacity="0.8">
    <line x1="74" y1="104" x2="120" y2="112"/>
    <line x1="74" y1="104" x2="62" y2="120"/>
  </g>
  <circle class="node" cx="120" cy="112" r="6"/>
  <circle class="node" cx="62" cy="120" r="6"/>
  <text x="100" y="190" text-anchor="middle" fill="#f4f1ea" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="13" letter-spacing="2">THE GAP LAUNCHES</text>
</svg>
