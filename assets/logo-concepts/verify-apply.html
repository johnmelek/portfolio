<!doctype html>
<html><head><meta charset="utf-8"><style>body{background:#161616;color:#fff;font-family:Arial;padding:30px}
.row{display:flex;gap:30px;align-items:center;margin-bottom:24px}
.box{background:#222;border:1px solid #333;border-radius:12px;padding:20px}
.box img{display:block}
.lbl{font-size:12px;color:#9a958c;margin-top:8px;text-align:center}</style></head>
<body>
<h3>Applied mark (e6 fusion) — header + favicon</h3>
<div class="row">
  <div><div class="box"><img src="../../assets/logo.svg" width="200" height="200"></div><div class="lbl">logo.svg (header)</div></div>
  <div><div class="box"><img src="../../assets/favicon.png" width="64" height="64"></div><div class="lbl">favicon.png 64px</div></div>
  <div><div class="box"><img src="../../assets/favicon.png" width="32" height="32"></div><div class="lbl">favicon 32px</div></div>
  <div><div class="box"><img src="../../assets/favicon.png" width="16" height="16"></div><div class="lbl">favicon 16px</div></div>
</div>
</body></html>
